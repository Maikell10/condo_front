<div
    class="min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden font-sans selection:bg-indigo-100 selection:text-indigo-900 bg-gradient-to-br from-[#1a2b4b] to-[#3b82f6]">

    <!-- Elementos decorativos de fondo adaptados al fondo oscuro -->
    <div
        class="absolute -top-24 -left-24 w-96 h-96 bg-white/10 rounded-full mix-blend-overlay filter blur-3xl opacity-50 animate-blob">
    </div>
    <div
        class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-400/20 rounded-full mix-blend-overlay filter blur-3xl opacity-50 animate-blob animation-delay-2000">
    </div>

    <!-- Contenedor Principal (Glassmorphism sobre fondo oscuro) -->
    <div class="w-full max-w-md bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-8 sm:p-10 relative z-10">

        <!-- Cabecera y Logo -->
        <div class="flex flex-col items-center mb-10">
            <div
                class="w-20 h-20 rounded-2xl overflow-hidden flex items-center justify-center bg-white shadow-md shadow-slate-200 border border-slate-100 mb-5">
                <img src="/LOGO.jpg" alt="Logo Condominio A Un Clic" class="w-full h-full object-contain p-2">
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight text-center m-0">Bienvenido</h1>
            <p class="text-slate-500 text-sm mt-2 text-center font-medium">Selecciona tu perfil para ingresar</p>
        </div>

        <!-- Opciones de Ingreso -->
        <div class="space-y-4">

            <!-- Botón: Propietario -->
            <button (click)="goTo('/auth/owner')"
                class="w-full group flex items-center p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-emerald-500 hover:bg-emerald-50/30 hover:shadow-md transition-all text-left outline-none">
                <div
                    class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center group-hover:bg-emerald-100 group-hover:scale-110 transition-transform mr-4">
                    <mat-icon>home</mat-icon>
                </div>
                <div class="flex-1">
                    <h3 class="text-base font-bold text-slate-800 group-hover:text-emerald-900 m-0 leading-tight">
                        Propietario</h3>
                    <p class="text-xs text-slate-500 m-0 mt-1 font-medium">Consulta recibos y reporta pagos</p>
                </div>
                <mat-icon
                    class="text-slate-300 group-hover:text-emerald-600 transform group-hover:translate-x-1 transition-all">chevron_right</mat-icon>
            </button>

            <!-- Botón: Administrador de Edificio -->
            <button (click)="goTo('/auth/building-admin')"
                class="w-full group flex items-center p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-500 hover:bg-indigo-50/30 hover:shadow-md transition-all text-left outline-none">
                <div
                    class="w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center group-hover:bg-indigo-100 group-hover:scale-110 transition-transform mr-4">
                    <mat-icon>domain</mat-icon>
                </div>
                <div class="flex-1">
                    <h3 class="text-base font-bold text-slate-800 group-hover:text-indigo-900 m-0 leading-tight">
                        Administrador</h3>
                    <p class="text-xs text-slate-500 m-0 mt-1 font-medium">Gestiona tu condominio</p>
                </div>
                <mat-icon
                    class="text-slate-300 group-hover:text-indigo-600 transform group-hover:translate-x-1 transition-all">chevron_right</mat-icon>
            </button>

            <!-- Botón: Super Administrador -->
            <button (click)="goTo('/auth/admin')"
                class="w-full group flex items-center p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-slate-400 hover:bg-slate-50/80 hover:shadow-sm transition-all text-left outline-none">
                <div
                    class="w-12 h-12 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center group-hover:bg-slate-200 group-hover:scale-110 transition-transform mr-4">
                    <mat-icon>admin_panel_settings</mat-icon>
                </div>
                <div class="flex-1">
                    <h3 class="text-base font-bold text-slate-800 group-hover:text-slate-900 m-0 leading-tight">Super
                        Admin</h3>
                    <p class="text-xs text-slate-500 m-0 mt-1 font-medium">Control total del sistema</p>
                </div>
                <mat-icon
                    class="text-slate-300 group-hover:text-slate-600 transform group-hover:translate-x-1 transition-all">chevron_right</mat-icon>
            </button>

        </div>

        <!-- 🔥 Volver atrás (Usando goTo('/') en vez de routerLink) -->
        <div class="mt-8 text-center">
            <a (click)="goTo('/')"
                class="text-sm font-bold text-slate-400 hover:text-indigo-600 flex items-center justify-center gap-1 transition-colors cursor-pointer">
                <mat-icon class="text-[18px] w-[18px] h-[18px]">arrow_back</mat-icon>
                Volver al inicio
            </a>
        </div>
    </div>

    <!-- Texto blanco/transparente para contrastar con el fondo azul oscuro -->
    <div class="absolute bottom-6 text-center w-full text-white/60 text-xs font-medium">
        © 2026 Condominio A Un Clic
    </div>
</div>
