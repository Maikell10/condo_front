<mat-card class="premium-card">
    <h2 style="text-align: center; color: #1e293b; font-weight: 900; margin-bottom: 20px;">Acceso Propietario</h2>

    <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 1.5rem;">
            <mat-label>Código de Acceso (8 caracteres)</mat-label>
            <mat-icon matPrefix style="color: #6366f1; margin-right: 8px;">vpn_key</mat-icon>
            <input matInput type="text" [(ngModel)]="accessCode" name="accessCode" placeholder="Ej: A8K3M9P2"
                maxlength="8" minlength="8" required
                style="text-transform: uppercase; font-family: monospace; font-size: 1.2rem; letter-spacing: 2px;" />
            <mat-hint>Ingresa el código único de tu apartamento</mat-hint>
        </mat-form-field>

        <!-- El botón se deshabilita si está cargando o si el código no tiene 8 caracteres -->
        <button mat-flat-button color="primary" type="submit"
            [disabled]="isLoading || !accessCode || accessCode.length !== 8"
            style="width: 100%; height: 50px; font-size: 1rem; font-weight: bold; border-radius: 12px;">
            {{ isLoading ? 'Verificando...' : 'Entrar al Panel' }}
        </button>

        <p *ngIf="error"
            style="color: #ef4444; margin-top: 1rem; text-align: center; font-weight: 500; font-size: 14px;">
            <mat-icon
                style="vertical-align: middle; font-size: 18px; width: 18px; height: 18px;">error_outline</mat-icon>
            {{ error }}
        </p>
    </form>
</mat-card>
