<mat-card>
    <h2>Login Admin de Edificio</h2>

    <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width" style="width: 100%; margin-bottom: 1rem;">
            <mat-label>Correo Electrónico</mat-label>
            <input matInput [(ngModel)]="email" name="email" type="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width" style="width: 100%; margin-bottom: 1rem;">
            <mat-label>Contraseña</mat-label>
            <input matInput [(ngModel)]="password" name="password" type="password" required />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="isLoading" style="width: 100%;">
            {{ isLoading ? 'Validando...' : 'Entrar' }}
        </button>

        <p *ngIf="error" style="color: red; margin-top: 1rem; text-align: center;">{{ error }}</p>
    </form>
</mat-card>
