<div class="p-6 space-y-6 max-w-7xl mx-auto pb-12 print:p-0">
    <div
        class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 print:hidden">
        <div>
            <div class="flex items-center gap-2 text-emerald-600 mb-1">
                <mat-icon class="scale-75">verified</mat-icon>
                <span class="text-xs font-bold uppercase tracking-wider">Historial de Solvencia</span>
            </div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight m-0">Recibos Pagados</h1>
            <p class="text-gray-500 mt-1 text-sm">Consulta y descarga tus comprobantes de pago anteriores.</p>
        </div>
    </div>

    <mat-card class="overflow-hidden border-none shadow-xl rounded-2xl bg-white premium-card">
        <div class="overflow-x-auto">
            <table mat-table [dataSource]="paidHistory()" class="w-full">
                <ng-container matColumnDef="period">
                    <th mat-header-cell *matHeaderCellDef
                        class="font-bold text-gray-500 uppercase text-[11px] py-5 pl-6">Período</th>
                    <td mat-cell *matCellDef="let row" class="pl-6 font-bold text-gray-700"> {{ row.period }} </td>
                </ng-container>

                <ng-container matColumnDef="amount">
                    <th mat-header-cell *matHeaderCellDef class="font-bold text-gray-500 uppercase text-[11px]">Monto
                        Pagado</th>
                    <td mat-cell *matCellDef="let row" class="font-medium text-gray-900"> {{ row.amount |
                        currency:'$':'symbol':'1.2-2' }} </td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef
                        class="font-bold text-gray-500 uppercase text-[11px] text-center">Estado</th>
                    <td mat-cell *matCellDef="let row" class="text-center">
                        <span
                            class="px-3 py-1 rounded-full text-[10px] font-black uppercase bg-emerald-100 text-emerald-700">{{
                            row.status }}</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef
                        class="font-bold text-gray-500 uppercase text-[11px] text-right pr-6">Acciones</th>
                    <td mat-cell *matCellDef="let row" class="text-right pr-4">
                        <button mat-icon-button class="text-indigo-600" matTooltip="Descargar Recibo"
                            (click)="downloadReceipt(row)">
                            <mat-icon>picture_as_pdf</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns" class="bg-gray-50/50"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"
                    class="hover:bg-gray-50/50 transition-colors"></tr>
            </table>
        </div>
    </mat-card>
</div>
